name: Backend Quality

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  python-fetcher:
    name: python-fetcher
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        run: python -m pip install -e .[dev]

      - name: Run Python linting
        run: python -m ruff check python scripts

      - name: Run Python unit tests with coverage
        run: |
          python -m coverage run -m unittest discover -s python/tests -t python
          python -m coverage xml -o coverage/python-coverage.xml
          python -m coverage report --fail-under=100

      - name: Upload Python coverage
        uses: actions/upload-artifact@v7
        with:
          name: python-coverage
          path: coverage/python-coverage.xml

  fortran-engine:
    name: fortran-engine
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Install Fortran build dependencies
        run: sudo apt-get update && sudo apt-get install --yes gfortran ninja-build gcovr

      - name: Configure coverage build
        run: cmake --preset coverage

      - name: Build Fortran engine
        run: cmake --build --preset coverage

      - name: Run Fortran tests
        run: ctest --preset coverage --output-on-failure

      - name: Collect Fortran coverage
        run: |
          mkdir -p coverage
          gcovr --root . --filter fortran/source --xml-pretty --output coverage/fortran-coverage.xml --fail-under-line 70

      - name: Upload Fortran coverage
        uses: actions/upload-artifact@v7
        with:
          name: fortran-coverage
          path: coverage/fortran-coverage.xml
