name: Release Drafter

on:
  push:
    branches:
      - main

permissions:
  contents: read
  pull-requests: read

jobs:
  update_release_draft:
    name: update-release-draft
    runs-on: ubuntu-latest
    steps:
      - name: Update release draft
        uses: release-drafter/release-drafter@v6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
