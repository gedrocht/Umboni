name: Stale Maintenance

on:
  schedule:
    - cron: '0 5 * * 1'

permissions:
  issues: write
  pull-requests: write

jobs:
  stale:
    name: stale
    runs-on: ubuntu-latest
    steps:
      - name: Mark stale issues and pull requests
        uses: actions/stale@v9
        with:
          stale-issue-message: >
            This issue has been inactive for a while. If it is still relevant, please add an update so we can keep it active.
          stale-pr-message: >
            This pull request has been inactive for a while. Please rebase, re-run checks, or leave a note if you still want help landing it.
          days-before-issue-stale: 45
          days-before-pr-stale: 21
          days-before-close: 14

