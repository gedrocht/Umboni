name: Feature request
description: Propose a new capability, provider integration, or documentation improvement.
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem statement
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
    validations:
      required: true
  - type: textarea
    id: risks
    attributes:
      label: Risks and alternatives
    validations:
      required: true

