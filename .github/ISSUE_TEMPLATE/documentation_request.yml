name: Documentation request
description: Ask for a tutorial, clarification, or wiki improvement.
title: "[Docs]: "
labels:
  - documentation
body:
  - type: textarea
    id: gap
    attributes:
      label: What is unclear?
    validations:
      required: true
  - type: textarea
    id: audience
    attributes:
      label: Who is the audience?
      description: "Example: complete beginner, contributor, maintainer, reviewer."
    validations:
      required: true
  - type: textarea
    id: desired-outcome
    attributes:
      label: What explanation would help most?
    validations:
      required: true
