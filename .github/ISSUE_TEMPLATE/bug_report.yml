name: Bug report
description: Report a defect or regression in the fetcher, Fortran engine, docs, or Angular dashboard.
title: "[Bug]: "
labels:
  - bug
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What broke?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: dropdown
    id: affected-layer
    attributes:
      label: Affected layer
      options:
        - Python fetcher
        - Fortran engine
        - Angular dashboard
        - Documentation
        - GitHub automation
    validations:
      required: true
