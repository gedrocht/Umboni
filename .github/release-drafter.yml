name-template: 'v$RESOLVED_VERSION'
tag-template: 'v$RESOLVED_VERSION'
categories:
  - title: 'Features'
    labels:
      - enhancement
  - title: 'Bug fixes'
    labels:
      - bug
  - title: 'Documentation'
    labels:
      - documentation
  - title: 'Maintenance'
    labels:
      - dependencies
      - ci
change-template: '- $TITLE (#$NUMBER)'
template: |
  ## Changes

  $CHANGES
