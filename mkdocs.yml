site_name: Umboni Weather Intelligence Platform
site_description: Beginner-friendly documentation for the Umboni Fortran, Python, and Angular weather platform.
site_url: https://gedrocht.github.io/Umboni/
repo_url: https://github.com/gedrocht/Umboni
repo_name: gedrocht/Umboni
theme:
  name: material
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - content.code.copy
    - content.action.edit
  palette:
    - scheme: default
      primary: blue grey
      accent: amber
markdown_extensions:
  - admonition
  - tables
  - toc:
      permalink: true
nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - Architecture: architecture-overview.md
  - Data Flow: data-flow.md
  - Testing Strategy: testing-strategy.md
  - Logging and Observability: logging-and-observability.md
  - External Libraries: external-libraries.md
  - Tutorials:
      - Beginner Walkthrough: tutorials/beginner-walkthrough.md
      - Adding a Provider: tutorials/adding-a-provider.md

