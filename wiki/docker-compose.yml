services:
  wiki:
    image: requarks/wiki:2
    ports:
      - "3000:3000"
    environment:
      DB_TYPE: postgres
      DB_HOST: database
      DB_PORT: 5432
      DB_USER: wikijs
      DB_PASS: wikijs
      DB_NAME: wikijs
    depends_on:
      - database
  database:
    image: postgres:16
    environment:
      POSTGRES_DB: wikijs
      POSTGRES_USER: wikijs
      POSTGRES_PASSWORD: wikijs
    volumes:
      - wiki_database:/var/lib/postgresql/data

volumes:
  wiki_database:

